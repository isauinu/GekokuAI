name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GekokuAI
        uses: actions/checkout@v4

      - name: Checkout Dory
        uses: actions/checkout@v4
        with:
          # Replace this with your fork if you maintain your own fixes
          repository: clidey/dory
          ref: main
          path: dory

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dory/package-lock.json

      - name: Replace example docs
        run: |
          rm -rf dory/docs
          mkdir -p dory/docs
          cp -R docs/. dory/docs/

      - name: Install dependencies
        working-directory: dory
        run: npm install

      - name: Install terser
        working-directory: dory
        run: npm install terser

      - name: Build documentation
        working-directory: dory
        run: npm run build:docs

      - name: Build embed files
        working-directory: dory
        run: npm run build:embed

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dory/dist

  deploy:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4